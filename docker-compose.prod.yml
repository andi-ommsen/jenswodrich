networks:
  jenswodrich-network:
    driver: bridge

services:

  # ── Nginx: baut Frontend + serviert statisch ──────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile.prod
    ports:
      - "127.0.0.1:8080:80"   # nur localhost – SSL läuft über Host-Nginx
    networks:
      - jenswodrich-network
    restart: unless-stopped
